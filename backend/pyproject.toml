[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = "/(alembic)/"

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["app"]
skip = ["alembic"]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["alembic"]

# Import order handled by isort (see [tool.isort]); ruff "I" omitted to avoid conflicts.
[tool.ruff.lint]
select = ["E", "F", "W", "N", "UP"]
# E501: line length is Black's job. N806/N803/N802: ML/math naming (X_train, Sigma, h1).
# N999: module names like ml2 are established API. UP042: `str, Enum` mixin is intentional
# (JSON-serializable enums). E731: a couple of small lambda assignments are fine.
ignore = ["E501", "N802", "N803", "N806", "N999", "UP042", "E731"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["N802", "N803", "N806"]

[tool.mypy]
python_version = "3.12"
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true
# Gradual typing: large existing surface; CI still runs mypy to catch regressions.
disable_error_code = [
    "no-untyped-def",
    "type-arg",
    "valid-type",
    "union-attr",
    "attr-defined",
    "arg-type",
    "call-arg",
    "var-annotated",
    "index",
    "operator",
    "misc",
    "import-untyped",
    "dict-item",
    "type-var",
    "assignment",
    "return-value",
    "call-overload",
    "list-item",
]
exclude = [
    "alembic/",
    "venv/",
    ".venv/",
    "build/",
    "dist/",
    "tests/",
]
